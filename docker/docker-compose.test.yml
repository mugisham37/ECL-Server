services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecl
      POSTGRES_PASSWORD: ecl_password
      POSTGRES_DB: ecl_test_db
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
